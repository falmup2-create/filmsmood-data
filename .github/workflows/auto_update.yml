name: Auto Video URL Updater

on:
  schedule:
    # السكربت سيعمل تلقائياً كل 12 ساعة (الساعة 12 ظهراً و 12 ليلاً بتوقيت جرينتش)
    - cron: '0 */12 * * *'
  workflow_dispatch: # هذا الخيار يتيح لك تشغيل السكربت يدوياً بضغطة زر في أي وقت تريد

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
    - name: سحب كود المستودع
      uses: actions/checkout@v3

    - name: تهيئة بيئة بايثون
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: تثبيت المكتبات البرمجية المطلوبة
      run: |
        pip install requests beautifulsoup4

    - name: تشغيل سكربت الفحص والتحديث
      run: python updater.py

    - name: حفظ التغييرات وإعادة رفعها للمستودع تلقائياً
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add database.json blogger_format.js
        git diff --quiet && git diff --staged --quiet || git commit -m "تحديث تلقائي لروابط الفيديو المكسورة"
        git push
